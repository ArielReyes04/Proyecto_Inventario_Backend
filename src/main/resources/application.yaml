server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:bd-usuarios}}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:12345}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    
logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

app:
  defaults:
    admin-password: ${DEFAULT_ADMIN_PASSWORD:admin1234}
    bodega-password: ${DEFAULT_BODEGA_PASSWORD:bodega1234}
    vendedor-password: ${DEFAULT_VENDEDOR_PASSWORD:vendedor1234}
    asistente-password: ${DEFAULT_ASISTENTE_PASSWORD:asistente1234}