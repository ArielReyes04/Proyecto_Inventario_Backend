name: Backend - CI/CD Pipeline con Telegram

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: PROMOCIÓN A TEST
  # ==========================================
  promote-to-test:
    name: Promover código de Develop a Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Develop a Test
        run: |
          git checkout test || git checkout -b test
          git merge origin/develop --no-edit
          git push origin test

  # ==========================================
  # JOB 2: PRUEBAS BACKEND
  # ==========================================
  run-tests:
    name: Ejecutar Pruebas (Spring Boot)
    needs: promote-to-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: bd-usuarios
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Descargar código a testear
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Entorno Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Compilar y Probar Backend
        run: |
          mkdir -p evidencias
          chmod +x mvnw
          cp src/main/resources/application.example.yaml src/main/resources/application.yaml
          ./mvnw clean test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/bd-usuarios -Dspring.datasource.username=postgres -Dspring.datasource.password=12345 > evidencias/backend_tests.log 2>&1 || true
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Guardar evidencias en rama test
        run: |
          echo "Análisis SonarQube completado. Revisa el dashboard en SonarCloud/SonarQube." > evidencias/backend_sonar.log
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add evidencias/
          git commit -m "chore: agregar evidencias de pruebas y sonar [skip ci]" || echo "No hay cambios en evidencias"
          git push origin HEAD:test

  # ==========================================
  # JOB 3: PROMOCIÓN A MAIN
  # ==========================================
  promote-to-main:
    name: Promover código de Test a Main
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Test a Main
        run: |
          git checkout main
          git merge origin/test --no-edit
          git push origin main

  # ==========================================
  # JOB 4: NOTIFICACIÓN DE TELEGRAM
  # ==========================================
  notify-telegram:
    name: Notificación a Telegram
    needs: [promote-to-test, run-tests, promote-to-main]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensaje de Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📢 *Backend CI/CD Pipeline* 📢
            Repositorio: ${{ github.repository }}
            Autor: ${{ github.actor }}
            
            Resultados:
            - A Test: ${{ needs.promote-to-test.result }}
            - Pruebas: ${{ needs.run-tests.result }}
            - A Main: ${{ needs.promote-to-main.result }}
            
            [Ver Detalles](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
