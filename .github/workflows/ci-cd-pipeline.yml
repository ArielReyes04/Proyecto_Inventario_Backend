name: Backend - CI/CD Pipeline con Telegram

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: PROMOCIÓN A TEST
  # ==========================================
  promote-to-test:
    name: Promover código de Develop a Test
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Develop a Test
        run: |
          git checkout test || git checkout -b test
          git merge origin/develop --no-edit
          git push origin test

  # ==========================================
  # JOB 2: PRUEBAS BACKEND
  # ==========================================
  run-tests:
    name: Ejecutar Pruebas (Spring Boot)
    needs: promote-to-test
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.extract-summary.outputs.run }}
      success: ${{ steps.extract-summary.outputs.success }}
      fail: ${{ steps.extract-summary.outputs.fail }}
      bugs: ${{ steps.extract-summary.outputs.bugs }}
      vulns: ${{ steps.extract-summary.outputs.vulns }}
      smells: ${{ steps.extract-summary.outputs.smells }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: bd-usuarios
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Descargar código a testear
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Entorno Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          
      - name: Compilar y Probar Backend
        run: |
          mkdir -p evidencias
          chmod +x mvnw
          cp src/main/resources/application.example.yaml src/main/resources/application.yaml
          ./mvnw clean test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/bd-usuarios -Dspring.datasource.username=postgres -Dspring.datasource.password=12345 > evidencias/backend_tests.log 2>&1 || true
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.branch.name=master
          
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
      - name: Extraer Métricas y Resumen de Pruebas
        id: extract-summary
        run: |
          # Limpiar colores ANSI del log
          perl -pe 's/\e\[[0-9;]*[mK]//g' evidencias/backend_tests.log > clean.log
          
          # Extraer pruebas
          TEST_LINE=$(grep "Tests run:" clean.log | tail -n 1) || true
          if [ -z "$TEST_LINE" ]; then
            RUN=0; FAIL=0; ERR=0; SKIP=0
          else
            RUN=$(echo "$TEST_LINE" | grep -oP 'Tests run: \K\d+' || echo "0")
            FAIL=$(echo "$TEST_LINE" | grep -oP 'Failures: \K\d+' || echo "0")
            ERR=$(echo "$TEST_LINE" | grep -oP 'Errors: \K\d+' || echo "0")
            SKIP=$(echo "$TEST_LINE" | grep -oP 'Skipped: \K\d+' || echo "0")
          fi
          SUCCESS=$((RUN - FAIL - ERR - SKIP))
          
          # Extraer métricas SonarCloud usando API
          METRICS_JSON=$(curl -s -u ${{ secrets.SONAR_TOKEN }}: "https://sonarcloud.io/api/measures/component?component=ferreteria-kanos_backend&metricKeys=bugs,vulnerabilities,code_smells,coverage")
          BUGS=$(echo $METRICS_JSON | jq -r '.component.measures[] | select(.metric=="bugs") | .value' 2>/dev/null || echo "N/A")
          VULNS=$(echo $METRICS_JSON | jq -r '.component.measures[] | select(.metric=="vulnerabilities") | .value' 2>/dev/null || echo "N/A")
          SMELLS=$(echo $METRICS_JSON | jq -r '.component.measures[] | select(.metric=="code_smells") | .value' 2>/dev/null || echo "N/A")
          
          echo "run=$RUN" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "fail=$((FAIL + ERR))" >> $GITHUB_OUTPUT
          echo "bugs=$BUGS" >> $GITHUB_OUTPUT
          echo "vulns=$VULNS" >> $GITHUB_OUTPUT
          echo "smells=$SMELLS" >> $GITHUB_OUTPUT

      - name: Guardar evidencias
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: evidencias-backend
          path: evidencias/

  # ==========================================
  # JOB 3: PROMOCIÓN A MAIN
  # ==========================================
  promote-to-main:
    name: Promover código de Test a Main
    needs: run-tests
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
      - name: Realizar Merge de Test a Main
        run: |
          git checkout main
          git merge origin/test --no-edit
          git push origin main

  # ==========================================
  # JOB 4: NOTIFICACIÓN DE TELEGRAM
  # ==========================================
  notify-telegram:
    name: Notificación a Telegram
    needs: [promote-to-test, run-tests, promote-to-main]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enviar mensaje de Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📢 *Backend CI/CD Pipeline* 📢
            Repositorio: ${{ github.repository }}
            
            Resultados:
            - Pruebas y Sonar: ${{ needs.run-tests.result }}
            - A Main: ${{ needs.promote-to-main.result }}
            
            🧪 *Tabla de Pruebas:*
            | Total | Éxito | Fallos |
            |-------|-------|--------|
            | ${{ needs.run-tests.outputs.run }} | ${{ needs.run-tests.outputs.success }} | ${{ needs.run-tests.outputs.fail }} |
            
            🛡️ *Calidad SonarCloud:*
            - Bugs: ${{ needs.run-tests.outputs.bugs }}
            - Vulnerabilidades: ${{ needs.run-tests.outputs.vulns }}
            - Code Smells: ${{ needs.run-tests.outputs.smells }}
            
            🔍 [Ver Análisis SonarCloud](https://sonarcloud.io/dashboard?id=ferreteria-kanos_backend)
            🔗 [Ver Detalles Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
